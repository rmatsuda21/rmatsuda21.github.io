<!DOCTYPE html>
<html>
<head>
	<style>
		body{
			background-color: none;
			margin: 0;
			min-height: 1000000px;
		}
	</style>
	<title>Recursion in HTML</title>
</head>
<body onload="setRandomColor()" id="body">
	<iframe src="recursiveWebsite.html" style="position: absolute; width: 80%; height: 80%; align=middle; border=none"></iframe>
	<script>
		function getRandomColor() {
			var letters = '0123456789ABCDEF';
			var color = '#';
		  	for (var i = 0; i < 6; i++) {
		    	color += letters[Math.floor(Math.random() * 16)];
		  	}
		  	return color;
		}

		function setRandomColor() {
		  document.getElementById("body").style.backgroundColor = getRandomColor();
		  console.log(document.getElementById("body").style.backgroundColor);
		  //$("body").css("background-color", getRandomColor());
		}
	</script>
</body>
</html>
